name: CI

on:
  push:
    branches: [main, v2.x, v3.x]
  pull_request:
    branches: [main, v2.x, v3.x]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check src/
      - run: ruff format --check src/ 2>/dev/null || true
      - run: pytest tests/ --tb=short

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: claw_cog_plugin
        run: |
          npm ci
          npx tsc --noEmit
          npm test
